name: Auto-merge

# Flags trusted bot PRs to merge the moment all required checks pass. GitHub's
# native auto-merge does the waiting — it only completes once the required CI
# status check (CI / unit-tests) is green, so nothing merges untested.
on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, ready_for_review]

# Elevated token scopes. For Dependabot-triggered runs GitHub honours this block
# but still withholds non-GITHUB_TOKEN secrets — which is exactly what we want.
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only our bots: Dependabot, or any PR carrying the "automerge" label (Gemini bot).
    if: >
      github.actor == 'dependabot[bot]' ||
      contains(github.event.pull_request.labels.*.name, 'automerge')
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        if: github.actor == 'dependabot[bot]'
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Dependabot: auto-merge patch/minor only; leave MAJOR bumps for a human.
      - name: Enable auto-merge for Dependabot (non-major)
        if: github.actor == 'dependabot[bot]' && steps.meta.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"

      - name: Note skipped major Dependabot bump
        if: github.actor == 'dependabot[bot]' && steps.meta.outputs.update-type == 'version-update:semver-major'
        run: echo "::notice::Major dependency bump — left for manual review (not auto-merged)."

      # Gemini bot (and any human-labelled PR): merge when checks pass.
      - name: Enable auto-merge for labelled PRs
        if: github.actor != 'dependabot[bot]' && contains(github.event.pull_request.labels.*.name, 'automerge')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
