name: Auto-merge

# Flags trusted bot PRs to merge the moment all required checks pass. GitHub's
# native auto-merge does the waiting — it only completes once the required CI
# status check (CI / unit-tests) is green, so nothing merges untested.
on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, ready_for_review]

# Elevated token scopes. For Dependabot-triggered runs GitHub honours this block
# but still withholds non-GITHUB_TOKEN secrets — which is exactly what we want.
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only our bots: Dependabot, or any PR carrying the "automerge" label (the AI bots).
    if: >
      github.actor == 'dependabot[bot]' ||
      contains(github.event.pull_request.labels.*.name, 'automerge')
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        if: github.actor == 'dependabot[bot]'
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Dependabot: auto-merge patch/minor for any ecosystem, PLUS majors for the
      # github-actions ecosystem (workflow action bumps are low-risk infra hygiene and
      # CI still has to pass). Leave MAJOR library/build bumps (gradle) for a human.
      - name: Enable auto-merge for Dependabot
        if: >
          github.actor == 'dependabot[bot]' &&
          (steps.meta.outputs.update-type != 'version-update:semver-major' ||
           steps.meta.outputs.package-ecosystem == 'github_actions')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"

      - name: Note skipped major Dependabot bump
        if: >
          github.actor == 'dependabot[bot]' &&
          steps.meta.outputs.update-type == 'version-update:semver-major' &&
          steps.meta.outputs.package-ecosystem != 'github_actions'
        run: echo "::notice::Major non-actions bump — left for manual review (not auto-merged)."

      # AI bots (and any human-labelled PR): merge when checks pass. Use BOT_PAT
      # (a real user), not GITHUB_TOKEN — so the resulting merge commit TRIGGERS the
      # release workflow (GITHUB_TOKEN-authored merges don't trigger `push` workflows).
      - name: Enable auto-merge for labelled PRs
        if: github.actor != 'dependabot[bot]' && contains(github.event.pull_request.labels.*.name, 'automerge')
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
