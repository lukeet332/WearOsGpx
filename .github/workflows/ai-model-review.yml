name: AI model self-review

# Once a month, ask the current model which model is best *today* for the fix bot,
# chosen ONLY from providers whose API key is configured here. If it recommends a
# change, validate it with a live call and open a PR editing .github/ai_model.json.
# Because the choice is limited to already-keyed providers, the switch auto-merges
# once CI passes. To widen the menu, add a provider key as a repo secret below + a
# row in ai_fix.PROVIDERS.
on:
  schedule:
    - cron: '0 7 1 * *'        # 07:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read                  # GitHub Models inference via GITHUB_TOKEN

concurrency:
  group: ai-model-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }

      - name: Assess best model & update config if better
        id: review
        env:
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}       # GitHub Models (default, free)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}      # already configured
          GEMINI_MODEL: gemini-2.5-flash
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python .github/scripts/ai_model_review.py

      # Only opens a PR if the assessment changed the config. Auto-merges: the chosen
      # model is a configured provider that passed a live validation call, and CI still
      # gates it. Fix PRs going forward are labelled with the new model so the switch
      # is visible in the PR list.
      - name: Open model-switch PR
        if: steps.review.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.BOT_PAT }}
          branch: ai/model-review
          delete-branch: true
          add-paths: .github/ai_model.json
          commit-message: "ci: switch AI fix model to ${{ steps.review.outputs.new_model }}"
          title: "🤖 Switch fix model → ${{ steps.review.outputs.new_provider }}/${{ steps.review.outputs.new_model }}"
          labels: automerge
          body: |
            Monthly automated model self-assessment.

            **Proposed switch:** provider **${{ steps.review.outputs.new_provider }}**, model `${{ steps.review.outputs.new_model }}`.

            **Reasoning:** ${{ steps.review.outputs.reason }}

            The model was chosen from providers whose key is already configured and passed a
            live validation call, so this auto-merges once CI (`assembleDebug` + unit tests)
            is green. Future fix PRs will be labelled with the new model. The bot falls back
            to Gemini if the model ever errors at runtime; revert by editing
            `.github/ai_model.json`.
