name: AI maintenance

# AI housekeeping (twice a week): capture the Gradle lint/compile logs, ask the model
# to fix deprecated Jetpack Compose / Kotlin APIs and obvious bugs, RE-RUN THE TESTS to
# prove the change is safe, then open a PR. The PR still has to pass the CI gate before
# auto-merge — the bot never merges unverified code. The "heavy thinking" runs on
# GitHub Models (GPT-4.1) via GITHUB_TOKEN (models:read), with Gemini as a fallback.
on:
  schedule:
    - cron: '0 6 * * 1,4'      # 06:00 UTC every Monday and Thursday
  workflow_dispatch:            # allow manual runs

permissions:
  contents: write
  pull-requests: write
  models: read                  # GitHub Models inference via GITHUB_TOKEN

concurrency:
  group: gemini-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: chmod +x ./gradlew

      # Lint + compile both modules; keep going on failure — the log is the input.
      - name: Capture lint + compile logs
        continue-on-error: true
        run: |
          set +e
          ./gradlew :mobile:lintDebug :wear:lintDebug compileDebugKotlin --no-daemon \
            > build-log.txt 2>&1
          echo "Gradle exit: $?"
          # Keep the prompt small: last 60 KB of the log only.
          tail -c 61440 build-log.txt > build-log.trunc.txt || true

      - name: Ask the model to propose fixes
        id: fix
        env:
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}    # GitHub Models auth (models:read)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: python .github/scripts/ai_fix.py             # active model from .github/ai_model.json

      # Hard gate: the proposed changes must still pass our unit tests, or we abort
      # (no PR). This is what makes an autonomous bot safe.
      - name: Verify the patched tree still builds & tests pass
        run: ./gradlew :mobile:testDebugUnitTest :wear:testDebugUnitTest --no-daemon --stacktrace

      # Created with BOT_PAT (not GITHUB_TOKEN) so the PR TRIGGERS the CI and
      # auto-merge workflows — GITHUB_TOKEN-authored PRs do not trigger workflows.
      - name: Open pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.BOT_PAT }}
          branch: gemini/maintenance
          delete-branch: true
          commit-message: "chore: automated maintenance (${{ steps.fix.outputs.bot_label || 'ai-bot' }})"
          title: "🤖 ${{ steps.fix.outputs.bot_label || 'ai-bot' }}: automated maintenance"
          labels: automerge
          add-paths: |
            **/*.kt
            **/*.kts
            gradle/libs.versions.toml
            .github/AI_CONTEXT.md
          body: |
            Automated maintenance proposed by **${{ steps.fix.outputs.bot_label || 'the AI fix bot' }}**
            (`${{ steps.fix.outputs.model_used }}`, Gemini fallback) from the twice-weekly run.

            - Source: Gradle lint + `compileDebugKotlin` logs.
            - These changes already passed `:mobile:testDebugUnitTest` + `:wear:testDebugUnitTest`
              in this job; the PR must also pass the **CI** check before auto-merge.
            - If nothing needed fixing, no PR is opened.
            - May append a learning to `.github/AI_CONTEXT.md` — review that too.

            Review the diff before trusting it — the model can be wrong.
