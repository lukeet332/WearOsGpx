name: CI

# Fast, stable JVM unit tests. On PRs it's the required merge gate; on main it's a
# health monitor (free minutes on public repos) — and if main ever goes red,
# ai-main-fix.yml debugs it and opens a fix PR. No emulator/instrumented tests.
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# Read-only: this workflow touches no secrets and needs no write access.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save free CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Assemble BOTH debug APKs, then run the unit tests, in one Gradle invocation.
      # assembleDebug is what catches resource/manifest/packaging breakage that the
      # unit tests miss (they compile Kotlin but don't run AAPT2 / manifest merge /
      # APK packaging). So a PR that doesn't actually build can't pass this gate.
      - name: Build debug APKs + run unit tests (mobile + wear)
        run: >
          ./gradlew
          :mobile:assembleDebug :wear:assembleDebug
          :mobile:testDebugUnitTest :wear:testDebugUnitTest
          --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore
          retention-days: 7
