name: CI

# Runs the fast, stable JVM unit tests on every PR (and on main pushes as a
# baseline). No emulator/instrumented tests — kept quick and flake-free.
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# Read-only: this workflow touches no secrets and needs no write access.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save free CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run JVM unit tests (mobile + wear)
        run: ./gradlew :mobile:testDebugUnitTest :wear:testDebugUnitTest --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore
          retention-days: 7
