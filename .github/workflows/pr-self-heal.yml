name: PR self-heal & cleanup

# Reacts to a FAILED CI run on a PR. Runs from main via workflow_run, so it has full
# secret access even for Dependabot PRs (whose own runs don't). Two behaviours:
#   * gemini/** branches  → ask Gemini to fix the failure, push to the PR (re-runs CI),
#                           capped at 3 attempts, then give up + drop auto-merge.
#   * dependabot/** branches → close the PR (it can't merge anyway under branch
#                           protection; dependency failures aren't code-fixable, and
#                           the bad ones are pinned in dependabot.yml).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: pr-self-heal-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  triage:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BRANCH: ${{ github.event.workflow_run.head_branch }}
      RUN_ID: ${{ github.event.workflow_run.id }}
      REPO: ${{ github.repository }}
    steps:
      - name: Find the open PR for this branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          NUM=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          echo "number=$NUM" >> "$GITHUB_OUTPUT"
          echo "Open PR for $BRANCH: ${NUM:-none}"

      # ---- Dependabot: close the failing dependency PR ----
      - name: Close failing Dependabot PR
        if: startsWith(env.BRANCH, 'dependabot/') && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh pr comment "${{ steps.pr.outputs.number }}" --repo "$REPO" --body \
            "🤖 Closing — CI failed, so this dependency update can't merge (branch protection). If it becomes compatible, Dependabot will reopen it; otherwise it's pinned in \`.github/dependabot.yml\`."
          gh pr close "${{ steps.pr.outputs.number }}" --repo "$REPO" --delete-branch

      # ---- Gemini branch: self-heal loop ----
      - name: Checkout the PR branch
        if: startsWith(env.BRANCH, 'gemini/') && steps.pr.outputs.number != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.BOT_PAT }}
          fetch-depth: 0

      - name: Attempt guard (max 3 self-heal commits)
        id: guard
        if: startsWith(env.BRANCH, 'gemini/') && steps.pr.outputs.number != ''
        run: |
          N=$(git log --pretty=format:'%s' | grep -c '\[gemini-pr-fix\]' || true)
          echo "prior self-heal commits: $N"
          if [ "$N" -ge 3 ]; then echo "stop=true" >> "$GITHUB_OUTPUT"; else echo "stop=false" >> "$GITHUB_OUTPUT"; fi

      - name: Give up after 3 attempts
        if: startsWith(env.BRANCH, 'gemini/') && steps.guard.outputs.stop == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh pr comment "${{ steps.pr.outputs.number }}" --repo "$REPO" --body \
            "🤖 Gemini tried 3× but CI still fails — needs a human. Removed the auto-merge label."
          gh pr edit "${{ steps.pr.outputs.number }}" --repo "$REPO" --remove-label automerge || true

      - name: Set up JDK 17
        if: startsWith(env.BRANCH, 'gemini/') && steps.guard.outputs.stop == 'false'
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17', cache: gradle }

      - name: Set up Python
        if: startsWith(env.BRANCH, 'gemini/') && steps.guard.outputs.stop == 'false'
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Fetch the CI failure log
        if: startsWith(env.BRANCH, 'gemini/') && steps.guard.outputs.stop == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run view "$RUN_ID" --repo "$REPO" --log-failed > build-log.txt 2>&1 || true
          tail -c 61440 build-log.txt > build-log.trunc.txt || true

      - name: Ask Gemini to fix the failure
        if: startsWith(env.BRANCH, 'gemini/') && steps.guard.outputs.stop == 'false'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: python .github/scripts/gemini_fix.py

      - name: Push the fix (re-runs CI) or report no fix
        if: startsWith(env.BRANCH, 'gemini/') && steps.guard.outputs.stop == 'false'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          if git diff --quiet; then
            gh pr comment "${{ steps.pr.outputs.number }}" --repo "$REPO" --body \
              "🤖 Gemini had no safe fix for this CI failure."
            exit 0
          fi
          git config user.name "gemini-bot"
          git config user.email "gemini-bot@users.noreply.github.com"
          git commit -am "fix: address CI failure [gemini-pr-fix]"
          git push origin "HEAD:$BRANCH"
