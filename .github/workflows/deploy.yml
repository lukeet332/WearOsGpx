name: Deploy to Play (internal testing)

# Builds signed AABs for both modules on every push to main and uploads them to
# the Internal testing track. Requires these repo secrets:
#   PLAY_SERVICE_ACCOUNT_JSON  - Google Play service account JSON (the "API key")
#   KEYSTORE_BASE64            - base64 of the upload keystore (.jks)
#   KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
# One-time manual setup is still required (see README/notes): create the app in
# Play Console, enrol in Play App Signing, and upload the first release by hand.

# Runs only AFTER CI passes on main, so a build can never be deployed from a broken /
# non-compiling main.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    # Manual dispatch, or a SUCCESSFUL CI run that was a push to main.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/upload-keystore.jks"

      - name: Compute version code
        id: vc
        # GHA expressions have NO arithmetic operators, so compute it in shell.
        run: echo "code=$(( 1000 + GITHUB_RUN_NUMBER ))" >> "$GITHUB_OUTPUT"

      - name: Build release bundles
        env:
          # +1000 so CI codes always clear the first manual upload (mobile=1, wear=100001).
          VERSION_CODE: ${{ steps.vc.outputs.code }}
          KEYSTORE_FILE: ${{ github.workspace }}/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ORS_API_KEY: ${{ secrets.ORS_API_KEY }}   # optional; blank if unset
        run: ./gradlew :mobile:bundleRelease :wear:bundleRelease

      # Wear OS apps must publish to a DEDICATED Wear OS track (Aug 2023 policy),
      # separate from the phone app — so two uploads, two tracks.
      - name: Upload phone app (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.wearosgpx
          releaseFiles: mobile/build/outputs/bundle/release/mobile-release.aab
          track: internal
          status: completed

      - name: Upload Wear OS app (Wear OS internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.wearosgpx
          releaseFiles: wear/build/outputs/bundle/release/wear-release.aab
          # Wear OS internal track id — verify against the Console; usually "wear:internal".
          track: wear:internal
          status: completed
