name: Release

# Runs only AFTER CI passes on main, so a release can never be cut from a broken /
# non-compiling main. An AI picks the next SemVer bump from the commits, builds both
# signed APKs, tags the commit, publishes a GitHub Release, AND (if PLAY_DEPLOY_ENABLED)
# uploads the AABs to Play internal testing — all with the SAME version, so the Play
# versionName matches the GitHub release vX.Y.Z (no divergence).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write          # create tags + releases

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Gate: only release when meaningful APP code changed since the last release — not for
  # pipeline-only (.github/**) or docs (*.md) commits. Manual dispatch / first release
  # always proceed.
  guard:
    # Manual dispatch, or a SUCCESSFUL CI run that was a push to main.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.diff.outputs.app_changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0
      - name: Did app code change since the last release?
        id: diff
        env:
          DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ "$DISPATCH" = "true" ] || [ -z "$LAST_TAG" ]; then
            echo "Manual dispatch or first release -> proceeding."
            echo "app_changed=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          CHANGED=$(git diff --name-only "$LAST_TAG"..HEAD)
          echo "Files changed since $LAST_TAG:"; echo "$CHANGED"
          # Meaningful = anything NOT pipeline (.github/**), markdown, .gitignore, LICENSE or docs/**.
          MEANINGFUL=$(printf '%s\n' "$CHANGED" | grep -vE '^\.github/|(^|/)[^/]*\.md$|^\.gitignore$|^LICENSE|^docs/' || true)
          if [ -n "$MEANINGFUL" ]; then
            echo "Meaningful app changes found -> releasing."
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Only pipeline/docs changed -> skipping release."
            echo "app_changed=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: guard
    if: needs.guard.outputs.app_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          # The exact commit CI just greenlit (falls back to the branch on dispatch).
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0     # need full history + tags for versioning

      - name: Work out commits since the last release
        id: log
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$LAST_TAG" ]; then
            echo "last_version=${LAST_TAG#v}" >> "$GITHUB_OUTPUT"
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:'%s' | head -50)
          else
            echo "last_version=0.0.0" >> "$GITHUB_OUTPUT"
            COMMITS=$(git log --pretty=format:'%s' | head -50)
          fi
          {
            echo "commits<<COMMITS_EOF"
            echo "$COMMITS"
            echo "COMMITS_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: AI-decide next version
        id: ver
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          LAST_VERSION: ${{ steps.log.outputs.last_version }}
          COMMIT_LOG: ${{ steps.log.outputs.commits }}
        run: python .github/scripts/gemini_version.py

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/upload-keystore.jks"

      - name: Compute version code
        id: vc
        # Shared by the APKs and the Play AABs. Base 2000 keeps it above the legacy Play
        # uploads (phone 1071 / wear +100000) and always increasing.
        run: echo "code=$(( 2000 + GITHUB_RUN_NUMBER ))" >> "$GITHUB_OUTPUT"

      - name: Build signed release APKs
        env:
          VERSION_NAME: ${{ steps.ver.outputs.new_version }}
          VERSION_CODE: ${{ steps.vc.outputs.code }}
          KEYSTORE_FILE: ${{ github.workspace }}/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ORS_API_KEY: ${{ secrets.ORS_API_KEY }}
        run: ./gradlew :mobile:assembleRelease :wear:assembleRelease --no-daemon

      - name: Stage APKs with versioned names
        run: |
          V="${{ steps.ver.outputs.new_version }}"
          mkdir -p dist
          cp mobile/build/outputs/apk/release/mobile-release.apk "dist/WearOsGpx-mobile-v${V}.apk"
          cp wear/build/outputs/apk/release/wear-release.apk     "dist/WearOsGpx-wear-v${V}.apk"
          ls -la dist

      - name: Publish GitHub Release with APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.new_version }}
          name: v${{ steps.ver.outputs.new_version }}
          generate_release_notes: true
          files: |
            dist/WearOsGpx-mobile-v${{ steps.ver.outputs.new_version }}.apk
            dist/WearOsGpx-wear-v${{ steps.ver.outputs.new_version }}.apk
          body: |
            Automated release — version **v${{ steps.ver.outputs.new_version }}**
            (`${{ steps.ver.outputs.bump }}` bump, decided by AI from the merged changes).

            **Downloads:** the phone APK and the Wear OS APK are attached below.

      # ---- Play Store (internal testing) — SAME version as the GitHub release above ----
      # Gated by the PLAY_DEPLOY_ENABLED repo variable, and runs AFTER the GitHub release
      # is published so a Play hiccup never blocks the release. Reuses VERSION_NAME (the
      # vX.Y.Z just released) + VERSION_CODE, so Play's versionName matches GitHub.
      - name: Build signed release bundles (AABs)
        if: vars.PLAY_DEPLOY_ENABLED == 'true'
        env:
          VERSION_NAME: ${{ steps.ver.outputs.new_version }}
          VERSION_CODE: ${{ steps.vc.outputs.code }}
          KEYSTORE_FILE: ${{ github.workspace }}/upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ORS_API_KEY: ${{ secrets.ORS_API_KEY }}
        run: ./gradlew :mobile:bundleRelease :wear:bundleRelease --no-daemon

      - name: Upload phone app to Play (internal)
        if: vars.PLAY_DEPLOY_ENABLED == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.wearosgpx
          releaseFiles: mobile/build/outputs/bundle/release/mobile-release.aab
          tracks: internal
          status: completed

      # Wear OS apps must publish to a DEDICATED Wear OS track (Aug 2023 policy).
      - name: Upload Wear OS app to Play (wear:internal)
        if: vars.PLAY_DEPLOY_ENABLED == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.wearosgpx
          releaseFiles: wear/build/outputs/bundle/release/wear-release.aab
          tracks: wear:internal
          status: completed
