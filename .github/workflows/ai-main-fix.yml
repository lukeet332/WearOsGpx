name: AI fix broken main

# Safety net: if CI ever goes RED on main (a merge slipped something through, an
# external/toolchain change broke the build, etc.), the AI fix bot reads the failure log
# and opens a fix PR. That PR goes through the normal gate (CI → auto-merge), and if the
# first attempt is imperfect, pr-self-heal.yml iterates on it. Runs from main via
# workflow_run, so it has full secret access.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read
  models: read                  # GitHub Models inference via GITHUB_TOKEN

concurrency:
  group: ai-main-fix
  cancel-in-progress: false

jobs:
  fix-main:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.BOT_PAT }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '17', cache: gradle }

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - run: chmod +x ./gradlew

      - name: Fetch the failing CI log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run view "${{ github.event.workflow_run.id }}" --repo "${{ github.repository }}" --log-failed \
            > build-log.txt 2>&1 || true
          tail -c 61440 build-log.txt > build-log.trunc.txt || true

      - name: Ask the model to fix main
        id: fix
        env:
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}    # GitHub Models auth (models:read)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: python .github/scripts/ai_fix.py             # active model from .github/ai_model.json

      - name: Auto-format the changed Kotlin (ktlint)
        run: bash .github/scripts/format_changed.sh

      # Opens a PR only if the model actually changed something. The PR is gated by CI
      # like any other; pr-self-heal.yml will iterate if the first try isn't enough.
      - name: Open a fix PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.BOT_PAT }}
          branch: ai-fix(${{ steps.fix.outputs.bot_label || 'model' }})/main-fix
          delete-branch: true
          commit-message: "fix: repair broken main (CI failure) [ai-pr-fix]"
          title: "🤖 ${{ steps.fix.outputs.bot_label || 'ai-bot' }}: fix broken main (CI failure)"
          labels: automerge
          add-paths: |
            **/*.kt
            **/*.kts
            gradle/libs.versions.toml
            .github/AI_CONTEXT.md
          body: |
            CI failed on **main**. **${{ steps.fix.outputs.bot_label || 'The AI fix bot' }}**
            (`${{ steps.fix.outputs.model_used }}`) analysed the failure log
            and proposes this fix. It must pass CI before auto-merge; if the first attempt
            is imperfect, `pr-self-heal.yml` will iterate (max 3).

            Review before trusting — the model can be wrong.
